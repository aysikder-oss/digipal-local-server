<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digipal Local Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px;
      border-bottom: 1px solid #1e293b;
    }
    .header svg { width: 28px; height: 28px; color: #3b82f6; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .version { font-size: 11px; color: #64748b; background: #1e293b; padding: 2px 8px; border-radius: 10px; }
    .content { flex: 1; padding: 24px; }
    .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #f8fafc; }
    .stat-card .label { font-size: 12px; color: #64748b; margin-top: 4px; }
    .stat-card.online .value { color: #10b981; }
    .stat-card.sync .value { color: #3b82f6; }
    .section {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .section h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section h2 .dot { width: 8px; height: 8px; border-radius: 50%; }
    .section h2 .dot.green { background: #10b981; }
    .section h2 .dot.red { background: #ef4444; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: #94a3b8; }
    .info-row .value { color: #f1f5f9; font-weight: 500; }
    .login-form {
      max-width: 400px;
      margin: 80px auto;
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
    }
    .login-form h2 { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 8px; }
    .login-form p { font-size: 13px; color: #94a3b8; text-align: center; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
    }
    .form-group input:focus { border-color: #3b82f6; }
    .btn {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 12px; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const app = document.getElementById('app');
    let serverPort = 8787;

    async function init() {
      if (window.api) {
        serverPort = await window.api.getServerPort();
      }
      checkAuth();
    }

    async function checkAuth() {
      try {
        const res = await fetch(`http://localhost:${serverPort}/api/status`);
        const data = await res.json();
        if (data.status === 'running') {
          renderDashboard(data);
        }
      } catch {
        renderLogin();
      }
    }

    function renderLogin() {
      app.innerHTML = `
        <div class="login-form">
          <h2>Digipal Local Server</h2>
          <p>Connect your local server to your Digipal cloud account</p>
          <div class="form-group">
            <label>Hub Name</label>
            <input type="text" id="hubName" placeholder="e.g. Office Hub" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Your password" />
          </div>
          <div class="form-group">
            <label>Cloud Server URL</label>
            <input type="url" id="cloudUrl" placeholder="https://your-digipal.replit.app" />
          </div>
          <button class="btn" onclick="doLogin()">Register & Connect</button>
          <div id="loginError" class="error"></div>
        </div>
      `;
    }

    async function doLogin() {
      const name = document.getElementById('hubName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const cloudUrl = document.getElementById('cloudUrl').value;
      const errorEl = document.getElementById('loginError');

      if (!name || !email || !password || !cloudUrl) {
        errorEl.textContent = 'All fields are required';
        return;
      }

      try {
        const res = await fetch(`${cloudUrl}/api/hub/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Registration failed');
        errorEl.textContent = '';
        checkAuth();
      } catch (err) {
        errorEl.textContent = err.message;
      }
    }

    function renderDashboard(data) {
      app.innerHTML = `
        <div class="header">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></svg>
          <h1>Digipal Local Server</h1>
          <span class="version">v${data.version || '1.0.0'}</span>
        </div>
        <div class="content">
          <div class="status-grid">
            <div class="stat-card online">
              <div class="value">${data.connectedPlayers || 0}</div>
              <div class="label">Connected Players</div>
            </div>
            <div class="stat-card sync">
              <div class="value">${data.lastSync ? 'Synced' : 'Pending'}</div>
              <div class="label">Cloud Sync</div>
            </div>
            <div class="stat-card">
              <div class="value">Active</div>
              <div class="label">Server Status</div>
            </div>
          </div>
          <div class="section">
            <h2><span class="dot green"></span> Server Info</h2>
            <div class="info-row"><span class="label">Port</span><span class="value">${serverPort}</span></div>
            <div class="info-row"><span class="label">Last Cloud Sync</span><span class="value">${data.lastSync || 'Never'}</span></div>
            <div class="info-row"><span class="label">mDNS Service</span><span class="value">_digipal._tcp</span></div>
          </div>
        </div>
      `;
      setInterval(async () => {
        try {
          const res = await fetch('http://localhost:' + serverPort + '/api/status');
          const d = await res.json();
          renderDashboard(d);
        } catch {}
      }, 30000);
    }

    init();
  </script>
</body>
</html>
