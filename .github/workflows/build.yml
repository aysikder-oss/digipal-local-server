name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Clone cloud frontend
        run: git clone --depth 1 https://x-access-token:${{ secrets.CLOUD_REPO_PAT }}@github.com/aysikder-oss/Digipal-SignageSoftware-Replit-FIles.git ../cloud-app
      - name: Install frontend dependencies
        run: cd ../cloud-app && npm install --ignore-scripts
      - name: Build frontend
        run: cd ../cloud-app && VITE_IS_LOCAL_SERVER=true npx vite build --outDir $GITHUB_WORKSPACE/dist/public
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/public/

  build-windows:
    needs: [build-frontend]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/public
      - run: npm install
      - name: Compile TypeScript
        run: npx tsc
      - name: Build Windows Installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  build-mac:
    needs: [build-frontend]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/public
      - run: npm install
      - name: Compile TypeScript
        run: npx tsc
      - name: Build macOS Installer
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: release/*.dmg

  build-linux:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/public
      - run: npm install
      - name: Compile TypeScript
        run: npx tsc
      - name: Build Linux Installer
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: release/*.AppImage

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
